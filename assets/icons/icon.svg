<!--
  Nombre completo: icon.svg
  Ruta o ubicación: assets/icons/icon.svg

  Función:
    - Servir como icono principal vectorial de FitJeff.
    - Usarse como base para generar icon-192.png e icon-512.png cuando se creen los binarios finales.
    - Identificar visualmente la app en navegador, PWA y Electron.

  Se conecta con:
    - public/manifest.json cuando se actualice.
    - index.html cuando se conecte favicon.
    - main.js cuando se conecte icono de Electron.
-->

