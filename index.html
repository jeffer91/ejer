<!--
  Nombre completo: index.html
  Ruta o ubicación: index.html

  Función:
    - Punto de entrada principal de FitJeff.
    - Cargar estilos externos, manifest PWA, favicon y src/app.js.
    - Mantener una estructura limpia para Live Server, Electron, Firebase Hosting y celular.

  Se conecta con:
    - styles/base.css
    - styles/layout.css
    - styles/componentes.css
    - styles/responsive.css
    - public/fit-redesign.css
    - public/manifest.json
    - src/app.js
    - main.js cuando se ejecuta con Electron
-->

<!doctype html>
<html lang="es-EC">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="FitJeff: app personal para registrar entrenamientos, peso, estadísticas y recomendaciones." />

    <title>FitJeff</title>

    <link rel="manifest" href="./public/manifest.json" />
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/icon.svg" />

    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/componentes.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
    <link rel="stylesheet" href="./public/fit-redesign.css" />
  </head>

  <body>
    <noscript>
      <main style="padding: 20px; font-family: system-ui, sans-serif;">
        <h1>FitJeff necesita JavaScript</h1>
        <p>Activa JavaScript para usar la app de entrenamiento, peso, estadísticas y recomendaciones.</p>
      </main>
    </noscript>

    <div id="app">
      <main class="fit-main">
        <section class="card center" style="min-height: 260px;">
          <div>
            <h1>FitJeff</h1>
            <p class="muted">Cargando app...</p>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
