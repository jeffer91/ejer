<!-- =========================================================
Nombre completo: index.html
Ruta o ubicación: src/index.html
Función o funciones:
- Cargar la carcasa principal de la app Fitness Jeff.
- Mostrar el menú superior.
- Abrir subpantallas independientes dentro de un iframe.
Con qué se conecta:
- src/app/fit-shell.css
- src/app/fit-shell-main.js
========================================================= -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fitness Jeff</title>
  <link rel="stylesheet" href="./app/fit-shell.css">
</head>
<body>
  <header class="fit-shell-header">
    <section class="fit-shell-brand">
      <div class="fit-shell-logo" aria-hidden="true">FJ</div>
      <div>
        <h1>Fitness Jeff</h1>
        <p>Progreso, entrenamiento, horarios, IA y voz</p>
      </div>
    </section>

    <nav class="fit-shell-menu" aria-label="Menú principal">
      <div class="fit-shell-menu-item">
        <button class="fit-shell-menu-button" data-menu="progreso">Progreso</button>
        <div class="fit-shell-submenu" data-submenu="progreso">
          <button data-screen="./pantallas/01-progreso/01-peso/prpe-index.html">Peso</button>
          <button data-screen="./pantallas/01-progreso/02-medidas/prme-index.html">Medidas</button>
          <button data-screen="./pantallas/01-progreso/03-registrar-datos/prrd-index.html">Registrar datos</button>
        </div>
      </div>
      <div class="fit-shell-menu-item"><button class="fit-shell-menu-button" data-menu="entrenamiento">Entrenamiento</button><div class="fit-shell-submenu" data-submenu="entrenamiento"><button data-screen="./pantallas/02-entrenamiento/01-hoy/enho-index.html">Hoy</button><button data-screen="./pantallas/02-entrenamiento/02-hiit/enhi-index.html">HIIT</button><button data-screen="./pantallas/02-entrenamiento/03-rutinas/enru-index.html">Rutinas</button></div></div>
      <div class="fit-shell-menu-item"><button class="fit-shell-menu-button" data-menu="horarios">Horarios</button><div class="fit-shell-submenu" data-submenu="horarios"><button data-screen="./pantallas/03-ayuno/01-ayuno/ayay-index.html">Registro de horarios</button><button data-screen="./pantallas/03-ayuno/02-agua/ayag-index.html">Agua</button></div></div>
      <div class="fit-shell-menu-item"><button class="fit-shell-menu-button" data-menu="recomendaciones">Recomendaciones</button><div class="fit-shell-submenu" data-submenu="recomendaciones"><button data-screen="./pantallas/04-recomendaciones/01-analisis-general/reag-index.html">Análisis general</button><button data-screen="./pantallas/04-recomendaciones/02-entrenamiento/reen-index.html">Entrenamiento</button><button data-screen="./pantallas/04-recomendaciones/03-alimentacion/real-index.html">Alimentación</button><button data-screen="./pantallas/04-recomendaciones/04-habitos/reha-index.html">Hábitos</button></div></div>
      <div class="fit-shell-menu-item"><button class="fit-shell-menu-button" data-menu="ajustes">Ajustes</button><div class="fit-shell-submenu" data-submenu="ajustes"><button data-screen="./pantallas/05-ajustes/01-perfil/ajpe-index.html">Perfil</button><button data-screen="./pantallas/05-ajustes/02-google-sheets/ajgs-index.html">Google Sheets</button><button data-screen="./pantallas/05-ajustes/03-firebase/ajfb-index.html">Firebase</button><button data-screen="./pantallas/05-ajustes/04-gemini/ajgm-index.html">Gemini</button></div></div>
      <div class="fit-shell-menu-item"><button class="fit-shell-menu-button" data-menu="voz">Voz</button><div class="fit-shell-submenu" data-submenu="voz"><button data-screen="./pantallas/06-voz/01-asistente/voas-index.html">Asistente</button><button data-screen="./pantallas/06-voz/02-historial/vohi-index.html">Historial</button></div></div>
    </nav>
  </header>

  <main class="fit-shell-main">
    <section class="fit-shell-status" id="fit-shell-status" role="status">Abriendo Progreso / Peso...</section>
    <iframe id="fit-shell-frame" class="fit-shell-frame" title="Subpantalla activa" src="./pantallas/01-progreso/01-peso/prpe-index.html"></iframe>
  </main>

  <script src="./app/fit-shell-main.js"></script>
</body>
</html>
